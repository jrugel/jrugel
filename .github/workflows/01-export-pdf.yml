name: Export CV to PDF

on:
  push:
    branches:
      - main
    paths-ignore:
      - "CV.pdf"

jobs:
  build:
    runs-on: ubuntu-latest
    # Anti-loop guard 2: skip if the push was made by the bot itself
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc texlive-xetex

      - name: Convert Markdown to PDF
        run: pandoc README.md -o CV.pdf --pdf-engine=xelatex

      - name: Commit and push PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CV.pdf
          # Only commit if CV.pdf actually changed; [skip ci] is anti-loop guard 3
          git diff --cached --quiet || git commit -m "chore: auto-update CV.pdf [skip ci]"
          git push
